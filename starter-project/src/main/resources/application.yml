highways:
  datastore:
    datastoreId: ${DATASTORE_ID:datastore-eu}
    namespace: ${DATASTORE_NAMESPACE:demo}
    projectId: ${DATASTORE_PROJECT_ID:pocketwallet-dev-srv-epipoli}
gcloud:
  projectId: ${GCLOUD_PROJECT_ID:pocketwallet-dev-srv-epipoli}
micronaut:
  server:
    port: 8080
  openapi:
    enabled: ${SWAGGER_ENABLED:false}
  application:
    name: starter
  http:
    client:
      read-timeout: 120s
      connection-pool-idle-timeout: 30s
      connection-pool-max-connections: 50
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**
      openapi-explorer:
        paths: classpath:META-INF/swagger/views/openapi-explorer
        mapping: /openapi-explorer/**
  security:
    authentication: bearer
    endpoints:
      login:
        enabled: false
      oauth:
        enabled: false
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: ${JWT_GENERATOR_SIGNATURE_SECRET:pleaseChangeThisSecretForANewOne}
    interceptUrlMap:
      - pattern: /starter/**
        access:
          - isAnonymous()
      - pattern: /swagger/**
        httpMethod: GET
        access:
          - isAnonymous()
      - pattern: /swagger-ui/**
        httpMethod: GET
        access:
          - isAnonymous()
      - pattern: /**
        access:
          - isAuthenticated()
logger:
  levels:
    com.epipoli.starter: INFO
    com.epipoli.commons.datastore: INFO
